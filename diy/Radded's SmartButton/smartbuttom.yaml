### Radded's generic ESP8266 config file ###
# Table:
# -- ENV: Environment variables
# -- HW: Hardware-specific rules
# -- EXT: ESPHome extensions
# -- NET: Networking / AP / Connectivity
# -- HA: Home Assistant entities

# - ENV: Globals - #
esphome:
  name: "PUT A NAME HERE" # TODO: Fill a name
  friendly_name: "PUT A FRIENDLY NAME HERE" # TODO: Fill a friendly name
  on_boot:
    rtttl.play: "MegaLovChime:d=32,o=5,b=120: 16d1, 16d1, 64p, 16d1, 64p, 16a5., 32p, 16d"

# - HW: ESP8266 definitions - #
esp8266:
  board: esp01_1m

# - EXT: Enable logging - #
logger:

# - NET: Enable Home Assistant API - #
api:
  encryption:
    key: "PUT YOUR ENCRYPTION KEY HERE" # TODO: Fill an encryption key

# - NET: Enable OTAs - #
ota:
  - platform: esphome
    password: "PUT YOUR OTA PASSWORD HERE" # TODO: Fill an OTA password
    on_error:
      rtttl.play: "Sadge:d=8,o=4,b=120: 16b, 64p, 8c, 16b, 64p, 8c"

# - NET: Wifi information - #
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # - NET: Fallback hotspot - #
  ap:
    # No SSID means it should match the device name
    password: "PUT YOUR FALLBACK HOTSPOT PASSWORD HERE" # TODO: Fill a fallback hotspot password

  on_error:
    rtttl.play: "Sadge:d=8,o=4,b=120: 16b, 64p, 8c, 16b, 64p, 8c"

captive_portal:

# TODO: - HW: Your device config here - #

# - HA: Status LED entity - #
light:
  - platform: status_led
    name: "Smartbutton Status LED"
    id: "smartbutton_status_led"
    pin: 14

# - HW: Buzzer - #
output:
  - platform: esp8266_pwm
    pin: 5
    id: Buzzer

rtttl:
    output: buzzer

# - HA: Button entity - #
binary_sensor:
  - platform: gpio
    pin:
      number: 16
      mode:
        pulldown: true
        input: true
    name: "Smartbutton Button"
    on_press:
      - light.turn_on: "smartbutton_status_led"
      - rtttl.play: "boop:d=8,o=4,b=120: 32a, 64p, 64b"
      - delay: 30ms
      - light.turn_off: "smartbutton_status_led"
      - rtttl.play: "happy_boop:d=8,o=4,b=120: 32a, 64p, 64b, 8p, 32e6,32g6, 32p, 32e6,8g6"